name: Release Stable

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Optional release notes override"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          "version=$($package.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($package.build.productName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build stable release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:stable

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: ${{ steps.package.outputs.name }} v${{ steps.package.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: ${{ inputs.release_notes == '' }}
          body: ${{ inputs.release_notes }}
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
